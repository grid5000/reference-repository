---
pve-1:
  kind: physical
  serial: <serial>
  alias: [ntp]
  network_adapters:
    bmc:
      ip: 172.17.223.2
      mac: 38:68:dd:8c:70:e9
    default:
      ip: 172.16.223.2
      mac: e8:eb:d3:fd:ce:b9
    adm:
      ip: <admin-network-prefix>.1

pve-2:
  kind: physical
  serial: <pve-2-serial>
  bmc:
      ip: <bmc_network_prefix>.2
      mac: <pve-2-bmc-mac-address>
    default:
      ip: <production-network-prefix>.2
      mac: <pve-2-mac-address>
    adm:
      ip: <admin-network-prefix>.2

srv-data:
  kind: physical
  serial: <srv-data-serial>
  alias: [nfs]
  network_adapters:
  bmc:
      ip: <bmc_network_prefix>.3
      mac: <pve-3-bmc-mac-address>
    default:
      ip: <production-network-prefix>.3
      mac: <pve-3-mac-address>
    adm:
      ip: <admin-network-prefix>.3
